# Replaces the default nginx server block. Two responsibilities:
#   1) Serve the static site under /usr/share/nginx/html.
#   2) Reverse-proxy /api/forecast to the UW–Madison Ag Forecasting API
#      with permissive CORS headers (the upstream API itself does not
#      send them, so the browser can't call it directly).

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # DNS resolver for upstream HTTPS — without this nginx caches the
    # IP at startup and stale entries break the proxy days later.
    resolver 1.1.1.1 8.8.8.8 ipv6=off valid=30s;
    resolver_timeout 5s;

    # Compress text assets so the JSON snapshot ships small.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               image/svg+xml application/xml;
    gzip_min_length 1024;

    # ---------- Static site ----------
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=86400" always;
    }
    location /lib/ {
        add_header Cache-Control "public, max-age=86400" always;
    }
    location /data/ {
        add_header Cache-Control "public, max-age=300" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # ---------- CORS proxy for the forecast API ----------
    # Browser → /api/forecast?forecasting_date=YYYY-MM-DD&risk_days=1
    # Nginx   → https://connect.doit.wisc.edu/.../wisconet_g?<same args>
    location = /api/forecast {
        # Preflight: respond directly so OPTIONS never hits upstream.
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*" always;
            add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;
            add_header Access-Control-Max-Age 600 always;
            return 204;
        }

        # Variables force runtime DNS lookup against `resolver` above.
        set $upstream_host "connect.doit.wisc.edu";
        set $upstream_path "/ag_forecasting_api/v2/ag_models_wrappers/wisconet_g";

        proxy_pass https://$upstream_host$upstream_path$is_args$args;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_set_header Host   $upstream_host;
        proxy_set_header Accept "application/json";

        # Forecast for a fixed (date, risk_days) doesn't change — let
        # the browser cache it briefly.
        add_header Cache-Control "public, max-age=3600" always;
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
    }

    # Health check used by docker-compose HEALTHCHECK.
    location = /healthz {
        access_log off;
        add_header Content-Type "text/plain";
        return 200 "ok\n";
    }
}
